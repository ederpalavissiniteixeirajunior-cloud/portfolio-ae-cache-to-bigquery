name: Deploy Evidence to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  dbt:
    runs-on: ubuntu-latest
    env:
      DBT_BRAND_SCOPE: ${{ secrets.DBT_BRAND_SCOPE }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dbt
        run: pip install dbt-core dbt-bigquery

      - name: Create GCP credentials
        run: |
          cat <<EOF > /tmp/gcp-key.json
          ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          EOF

      - name: Create dbt profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          portfolio_ae:
            target: prod
            outputs:
              prod:
                type: bigquery
                method: service-account
                project: portfolio-ae-vendas
                dataset: raw
                keyfile: /tmp/gcp-key.json
                threads: 4
                timeout_seconds: 300
                location: US
                priority: interactive
          EOF

      - name: dbt deps
        working-directory: ./dbt_project
        run: dbt deps

      - name: dbt seed
        working-directory: ./dbt_project
        run: dbt seed

      - name: dbt run
        working-directory: ./dbt_project
        run: dbt run

      - name: dbt test
        working-directory: ./dbt_project
        run: dbt test

  build:
    needs: dbt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './dashboard/package-lock.json'

      - name: Install dependencies
        run: npm install
        working-directory: ./dashboard

      - name: Create GCP Key File
        run: |
          cat <<EOF > ./dashboard/gcp-key.json
          ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          EOF

      - name: Run Evidence Sources
        run: npm run sources
        working-directory: ./dashboard
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ./gcp-key.json

      - name: Build Static Site
        run: npm run build
        working-directory: ./dashboard
        env:
          EVIDENCE_BASE_PATH: /portfolio-ae-cache-to-bigquery

      - name: Disable Jekyll and Fix Paths
        run: touch ./dashboard/build/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dashboard/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
