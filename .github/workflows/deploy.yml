name: Deploy Evidence to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * *'  # 07:00 BRT (UTC-3) — runs after VPS ingestion window closes

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  dbt:
    runs-on: ubuntu-latest
    env:
      DBT_BRAND_SCOPE: ${{ secrets.DBT_BRAND_SCOPE }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dbt
        run: pip install dbt-core dbt-bigquery

      - name: Create GCP credentials
        run: |
          cat <<EOF > /tmp/gcp-key.json
          ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          EOF

      - name: Create dbt profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          portfolio_ae:
            target: prod
            outputs:
              prod:
                type: bigquery
                method: service-account
                project: portfolio-ae-vendas
                dataset: raw
                keyfile: /tmp/gcp-key.json
                threads: 4
                timeout_seconds: 300
                location: southamerica-east1
                priority: interactive
          EOF

      - name: dbt deps
        working-directory: ./dbt_project
        run: dbt deps

      - name: dbt seed
        working-directory: ./dbt_project
        run: dbt seed

      - name: dbt snapshot
        working-directory: ./dbt_project
        run: dbt snapshot

      - name: dbt run
        working-directory: ./dbt_project
        run: dbt run

      - name: dbt test
        working-directory: ./dbt_project
        run: dbt test

      - name: dbt docs generate
        working-directory: ./dbt_project
        run: dbt docs generate

      - name: Upload dbt docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbt-docs
          path: |
            ./dbt_project/target/index.html
            ./dbt_project/target/manifest.json
            ./dbt_project/target/catalog.json
          retention-days: 1

      - name: Notify Slack on failure
        if: failure()
        continue-on-error: true
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":red_circle: *Portfolio AE Pipeline Failed*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View failed run>"
            }

  build:
    needs: dbt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './dashboard/package-lock.json'

      - name: Install dependencies
        run: npm install
        working-directory: ./dashboard

      - name: Create GCP Key File
        run: |
          cat <<EOF > ./dashboard/gcp-key.json
          ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          EOF

      - name: Run Evidence Sources
        run: npm run sources
        working-directory: ./dashboard
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ./gcp-key.json

      - name: Build Static Site
        run: npm run build
        working-directory: ./dashboard
        env:
          EVIDENCE_BASE_PATH: /portfolio-ae-cache-to-bigquery

      - name: Download dbt docs
        uses: actions/download-artifact@v4
        with:
          name: dbt-docs
          path: ./dbt-docs-temp

      - name: Embed dbt docs into Evidence build
        run: |
          mkdir -p ./dashboard/build/dbt-docs
          cp ./dbt-docs-temp/index.html  ./dashboard/build/dbt-docs/
          cp ./dbt-docs-temp/manifest.json ./dashboard/build/dbt-docs/
          cp ./dbt-docs-temp/catalog.json  ./dashboard/build/dbt-docs/

      - name: Disable Jekyll and Fix Paths
        run: touch ./dashboard/build/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dashboard/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify Slack on success
        if: success()
        continue-on-error: true
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":large_green_circle: *Portfolio AE Pipeline Succeeded*\nDashboard updated: ${{ steps.deployment.outputs.page_url }}"
            }
